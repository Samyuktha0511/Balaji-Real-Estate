spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:realestate}?serverTimezone=Asia/Kolkata
    username: ${DB_USER:realestate}
    password: ${DB_PASS:changeme}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
server:
  port: 8080
file:
  upload-dir: ${UPLOAD_DIR:uploads}
